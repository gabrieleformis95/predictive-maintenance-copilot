services:
  api:
    build: .
    container_name: pmc-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/home/app/data:ro
      - ./chroma_db:/home/app/chroma_db
      - ./mlruns:/home/app/mlruns
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    container_name: pmc-ui
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api
    environment:
      - API_BASE_URL=http://api:8000
    command: streamlit run src/ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
